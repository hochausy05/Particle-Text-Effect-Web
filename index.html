<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Particle Text Effect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      overflow: hidden;
      background: #05030c;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .stage {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background:
        radial-gradient(circle at 48% 39%, rgba(255, 55, 190, .16), transparent 24%),
        radial-gradient(circle at 62% 62%, rgba(118, 44, 255, .10), transparent 36%),
        radial-gradient(circle at center, #150d27 0%, #080511 52%, #020106 100%);
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100dvh;
    }

    .hold-wrap {
      position: fixed;
      left: 50%;
      bottom: calc(var(--mobile-bottom, 34px) + env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      z-index: 10;
      transition: opacity .45s ease, transform .45s ease;
    }

    .hold-wrap.hide {
      opacity: 0;
      transform: translateX(-50%) translateY(22px) scale(.94);
      pointer-events: none;
    }

    .hold-btn {
      position: relative;
      width: clamp(62px, 16vw, 76px);
      height: clamp(62px, 16vw, 76px);
      border-radius: 50%;
      border: 1px solid rgba(255, 95, 205, .42);
      background: radial-gradient(circle, rgba(255, 75, 205, .26), rgba(255, 75, 205, .045) 64%);
      box-shadow: 0 0 22px rgba(255, 55, 190, .34), inset 0 0 18px rgba(255, 55, 190, .16);
      cursor: pointer;
    }

    .hold-btn::before {
      content: "";
      position: absolute;
      inset: -12px;
      border-radius: inherit;
      background: conic-gradient(from 0deg, transparent, rgba(255, 82, 207, .32), transparent 38%);
      filter: blur(1px);
      animation: spin 3.4s linear infinite;
      opacity: .75;
    }

    .hold-btn::after {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: rgba(255, 78, 205, .48);
      box-shadow: 0 0 22px rgba(255, 78, 205, .55);
      transform: scale(.9);
      transition: transform .18s ease;
    }

    .hold-btn.holding::after { transform: scale(1.16); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-ring {
      position: absolute;
      inset: -8px;
      transform: rotate(-90deg);
      z-index: 2;
    }

    .progress-ring circle {
      fill: none;
      stroke-width: 4;
      stroke-linecap: round;
    }

    .progress-ring .track { stroke: rgba(255,255,255,.12); }
    .progress-ring .bar {
      stroke: #ff4ecb;
      stroke-dasharray: 251;
      stroke-dashoffset: 251;
      filter: drop-shadow(0 0 5px rgba(255, 78, 203, .7));
    }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 2;
      background: radial-gradient(circle at center, transparent 45%, rgba(0,0,0,.54) 100%);
    }
  </style>
</head>
<body>
  <main class="stage">
    <canvas id="scene"></canvas>

    <div class="hold-wrap" id="holdWrap">
      <button class="hold-btn" id="holdBtn" aria-label="Chạm giữ để bắt đầu">
        <svg class="progress-ring" viewBox="0 0 92 92">
          <circle class="track" cx="46" cy="46" r="40"></circle>
          <circle class="bar" id="progressBar" cx="46" cy="46" r="40"></circle>
        </svg>
      </button>
    </div>

    <div class="vignette"></div>
  </main>

  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d", { alpha: false });
    const holdBtn = document.getElementById("holdBtn");
    const holdWrap = document.getElementById("holdWrap");
    const progressBar = document.getElementById("progressBar");

    const HOLD_TIME = 2000;
    const RING_LENGTH = 251;

    let w = 0;
    let h = 0;
    let dpr = 1;
    let count = 0;
    let running = true;
    let holding = false;
    let holdStart = 0;
    let busy = false;
    let textMode = false;
    let fieldStrength = .12;
    let targetFieldStrength = .12;

    let x, y, tx, ty, vx, vy, size, phase, speed;
    let textPoints = [];
    let glyphPoints = [];

    const pointer = { x: -9999, y: -9999, active: false };
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
    const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));

    function getParticleCount() {
      const area = window.innerWidth * window.innerHeight;
      const mobile = window.innerWidth < 650;
      if (reduceMotion) return mobile ? 1700 : 2600;
      if (mobile) return Math.min(7200, Math.max(5200, Math.floor(area / 68)));
      return Math.min(11500, Math.max(7600, Math.floor(area / 78)));
    }

    function resize() {
      w = window.innerWidth;
      h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, w < 650 ? 1.12 : 1.35);

      canvas.width = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      canvas.style.width = w + "px";
      canvas.style.height = h + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      document.documentElement.style.setProperty("--mobile-bottom", w < 650 ? "34px" : "42px");

      initParticles();
      scatter(true);
    }

    function initParticles() {
      count = getParticleCount();
      x = new Float32Array(count);
      y = new Float32Array(count);
      tx = new Float32Array(count);
      ty = new Float32Array(count);
      vx = new Float32Array(count);
      vy = new Float32Array(count);
      size = new Float32Array(count);
      phase = new Float32Array(count);
      speed = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        x[i] = Math.random() * w;
        y[i] = Math.random() * h;
        vx[i] = 0;
        vy[i] = 0;
        size[i] = Math.random() * .85 + .5;
        phase[i] = Math.random() * Math.PI * 2;
        speed[i] = Math.random() * .016 + .014;
      }
    }

    function scatterPoint() {
      const cx = w * .5;
      const cy = h * .45;
      const a = Math.random() * Math.PI * 2;
      const r = Math.pow(Math.random(), .52) * Math.max(w, h) * .64;
      return { x: cx + Math.cos(a) * r, y: cy + Math.sin(a) * r * .82 };
    }

    function scatter(immediate) {
      textMode = false;
      textPoints = [];
      glyphPoints = [];
      targetFieldStrength = .12;

      for (let i = 0; i < count; i++) {
        const p = scatterPoint();
        tx[i] = p.x;
        ty[i] = p.y;
        speed[i] = Math.random() * .012 + .012;
        size[i] = Math.random() * .85 + .5;
        if (immediate) {
          x[i] = p.x;
          y[i] = p.y;
        }
      }
    }

    function fontStack(px) {
      return "400 " + px + "px Pacifico, cursive";
    }

    function fitFont(octx, text, maxWidth, startSize) {
      let s = startSize;
      while (s > 28) {
        octx.font = fontStack(s);
        if (octx.measureText(text).width <= maxWidth) break;
        s -= 2;
      }
      return s;
    }

    function makeTextPoints(lines, config) {
      const off = document.createElement("canvas");
      const octx = off.getContext("2d", { willReadFrequently: true });
      off.width = Math.floor(w);
      off.height = Math.floor(h);
      octx.clearRect(0, 0, w, h);
      octx.textAlign = "center";
      octx.textBaseline = "middle";
      octx.lineJoin = "round";
      octx.lineCap = "round";
      octx.fillStyle = "#fff";
      octx.strokeStyle = "#fff";

      const baseSize = Math.min(config.max, Math.max(config.min, w / config.divisor));
      const lineHeight = baseSize * config.lineHeight;
      const startY = h * config.y - ((lines.length - 1) * lineHeight) / 2;
      const maxWidth = w * config.maxWidth;

      for (let i = 0; i < lines.length; i++) {
        const s = fitFont(octx, lines[i], maxWidth, baseSize);
        const yy = startY + i * lineHeight;
        octx.font = fontStack(s);
        octx.lineWidth = Math.max(1.3, s * .018);
        octx.strokeText(lines[i], w / 2, yy);
        octx.fillText(lines[i], w / 2, yy);
      }

      const data = octx.getImageData(0, 0, off.width, off.height).data;
      const points = [];
      const gap = w < 650 ? 3 : 3;

      for (let py = 1; py < off.height - 1; py += gap) {
        for (let px = 1; px < off.width - 1; px += gap) {
          if (data[(py * off.width + px) * 4 + 3] > 90) {
            points.push({ x: px + (Math.random() - .5) * .22, y: py + (Math.random() - .5) * .22 });
          }
        }
      }

      for (let i = points.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = points[i];
        points[i] = points[j];
        points[j] = t;
      }

      return points;
    }

    function formText(lines, config) {
      glyphPoints = makeTextPoints(lines, config);
      textPoints = glyphPoints;
      textMode = true;
      targetFieldStrength = .26;
      if (!glyphPoints.length) return;

      for (let i = 0; i < count; i++) {
        const p = glyphPoints[i % glyphPoints.length];
        tx[i] = p.x;
        ty[i] = p.y;
        speed[i] = Math.random() * .012 + .03;
        size[i] = Math.random() * .56 + .78;
      }
    }

    function cinematicBurst(power, inward) {
      const cx = w * .5;
      const cy = h * .45;
      for (let i = 0; i < count; i++) {
        const dx = x[i] - cx;
        const dy = y[i] - cy;
        const len = Math.sqrt(dx * dx + dy * dy) || 1;
        const dir = inward ? -1 : 1;
        const p = power * (.32 + Math.random() * .72);
        const tangent = inward ? .9 : .52;
        vx[i] += dir * (dx / len) * p + (-dy / len) * p * tangent;
        vy[i] += dir * (dy / len) * p + ( dx / len) * p * tangent;
      }
    }

    function pullToCenter(duration) {
      const cx = w * .5;
      const cy = h * .45;
      const start = performance.now();
      textMode = false;
      textPoints = [];
      glyphPoints = [];

      for (let i = 0; i < count; i++) {
        const a = (i / count) * Math.PI * 12;
        const r = 20 + Math.random() * 70;
        tx[i] = cx + Math.cos(a) * r;
        ty[i] = cy + Math.sin(a) * r * .55;
        speed[i] = Math.random() * .018 + .034;
      }

      return new Promise(resolve => {
        function tick() {
          const t = Math.min(1, (performance.now() - start) / duration);
          targetFieldStrength = .48 * (1 - easeOutCubic(t)) + .16;
          if (t >= 1) resolve();
          else requestAnimationFrame(tick);
        }
        tick();
      });
    }

    function drawBackground() {
      ctx.fillStyle = "#05030b";
      ctx.fillRect(0, 0, w, h);
      const bg = ctx.createRadialGradient(w * .48, h * .43, 0, w * .5, h * .5, Math.max(w, h) * .72);
      bg.addColorStop(0, textMode ? "rgba(255, 45, 185, .10)" : "rgba(255, 45, 185, .16)");
      bg.addColorStop(.36, textMode ? "rgba(67, 24, 110, .08)" : "rgba(67, 24, 110, .12)");
      bg.addColorStop(1, "rgba(3, 2, 8, 0)");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);
    }

    function drawParticles(now) {
      const repelRadius = w < 650 ? 72 : 94;
      const repelRadius2 = repelRadius * repelRadius;
      const hasPointer = pointer.active;

      drawParticleGroup(now, 0, "rgba(255, 64, 205, .98)", textMode ? 1.18 : 1.16, hasPointer, repelRadius, repelRadius2);
      drawParticleGroup(now, 1, "rgba(255, 135, 230, .86)", textMode ? 1.32 : 1.3, hasPointer, repelRadius, repelRadius2);
      drawParticleGroup(now, 2, "rgba(255, 235, 252, .68)", textMode ? .95 : .88, hasPointer, repelRadius, repelRadius2);
    }

    function drawParticleGroup(now, startIndex, color, sizeMul, hasPointer, repelRadius, repelRadius2) {
      ctx.fillStyle = color;
      for (let i = startIndex; i < count; i += 3) {
        const dx = tx[i] - x[i];
        const dy = ty[i] - y[i];
        const curl = Math.sin(now * .0012 + phase[i] + x[i] * .008) * fieldStrength;

        vx[i] = (vx[i] + dx * speed[i] + curl) * .865;
        vy[i] = (vy[i] + dy * speed[i] - curl * .45) * .865;

        if (hasPointer) {
          const mx = x[i] - pointer.x;
          const my = y[i] - pointer.y;
          const d2 = mx * mx + my * my;
          if (d2 < repelRadius2) {
            const d = Math.sqrt(d2) || 1;
            const f = (1 - d / repelRadius) * 1.18;
            vx[i] += (mx / d) * f;
            vy[i] += (my / d) * f;
          }
        }

        x[i] += vx[i];
        y[i] += vy[i];

        const twinkle = textMode ? 1 : .76 + Math.sin(now * .002 + phase[i]) * .24;
        const s = size[i] * sizeMul * twinkle;

        if (textMode) {
          ctx.fillRect(x[i] - s * .5, y[i] - s * .5, s, s);
          ctx.globalAlpha = .32;
          ctx.fillRect(x[i] - s, y[i] - s, s * 2, s * 2);
          ctx.globalAlpha = 1;
        } else {
          ctx.fillRect(x[i], y[i], s, s);
        }
      }
    }

    function drawFrame(now) {
      drawBackground();

      if (holding && !busy) {
        const p = Math.min(1, (performance.now() - holdStart) / HOLD_TIME);
        progressBar.style.strokeDashoffset = RING_LENGTH - RING_LENGTH * easeOutCubic(p);
        if (p >= 1) runSequence();
      }

      fieldStrength += (targetFieldStrength - fieldStrength) * .045;
      ctx.globalCompositeOperation = "lighter";
      drawParticles(now);

      if (textMode && glyphPoints.length) {
        ctx.fillStyle = "rgba(255, 92, 215, .42)";
        for (let i = 0; i < glyphPoints.length; i += 5) {
          const p = glyphPoints[i];
          ctx.fillRect(p.x - 1.1, p.y - 1.1, 2.2, 2.2);
        }
      }

      ctx.globalCompositeOperation = "source-over";

      if (running) requestAnimationFrame(drawFrame);
    }

    async function runSequence() {
      if (busy) return;
      busy = true;
      holding = false;
      holdBtn.classList.remove("holding");
      holdWrap.classList.add("hide");

      cinematicBurst(6.4, true);
      await pullToCenter(520);

      formText(["Chúc", "Mừng"], {
        max: w < 650 ? 122 : 172,
        min: 68,
        divisor: w < 650 ? 3.75 : 4.8,
        lineHeight: 1.05,
        y: .44,
        maxWidth: .9
      });

      await sleep(3000);
      cinematicBurst(5.2, false);
      await sleep(260);
      await pullToCenter(440);

      formText(["Ngày", "Quốc Tế", "Thiếu Nhi"], {
        max: w < 650 ? 86 : 132,
        min: 42,
        divisor: w < 650 ? 4.75 : 5.6,
        lineHeight: 1.08,
        y: .44,
        maxWidth: .93
      });

      await sleep(5600);
      resetScene();
    }

    function resetScene() {
      busy = false;
      holding = false;
      progressBar.style.strokeDashoffset = RING_LENGTH;
      holdWrap.classList.remove("hide");
      scatter(false);
    }

    function beginHold(e) {
      if (busy) return;
      e.preventDefault();
      holding = true;
      holdStart = performance.now();
      holdBtn.classList.add("holding");
      updatePointer(e);
    }

    function endHold() {
      if (busy) return;
      holding = false;
      progressBar.style.strokeDashoffset = RING_LENGTH;
      holdBtn.classList.remove("holding");
      pointer.active = false;
    }

    function updatePointer(e) {
      const p = e.touches ? e.touches[0] : e;
      if (!p) return;
      pointer.x = p.clientX;
      pointer.y = p.clientY;
      pointer.active = true;
    }

    holdBtn.addEventListener("pointerdown", beginHold, { passive: false });
    window.addEventListener("pointerup", endHold);
    window.addEventListener("pointercancel", endHold);
    window.addEventListener("pointermove", updatePointer, { passive: true });
    window.addEventListener("resize", resize);

    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", resize);
      window.visualViewport.addEventListener("scroll", resize);
    }

    document.addEventListener("visibilitychange", () => {
      running = !document.hidden;
      if (running) requestAnimationFrame(drawFrame);
    });

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => {
        resize();
        requestAnimationFrame(drawFrame);
      });
    } else {
      resize();
      requestAnimationFrame(drawFrame);
    }
  </script>
</body>
</html>
